# Render Blueprint: https://render.com/docs/blueprint-spec
# Docker web service (see ./Dockerfile). Set APP_KEY, APP_URL, API keys in dashboard.
# Shell: php artisan db:seed --force (after ADMIN_* env)

databases:
  - name: poc-db
    databaseName: poc
    user: poc

services:
  - type: web
    name: poc-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_CHANNEL
        value: stderr
      - key: ALLOW_REGISTRATION
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: poc-db
          property: connectionString
