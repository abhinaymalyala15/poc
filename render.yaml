# Free tier: no managed Postgres (SQLite file inside the container; data resets on redeploy).
# Docker on Render uses blueprint field `runtime: docker` (not `env: docker`).
# Set APP_KEY, APP_URL, Twilio/OpenAI in the dashboard. Shell: php artisan db:seed --force

services:
  - type: web
    name: poc-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_CHANNEL
        value: stderr
      - key: ALLOW_REGISTRATION
        value: "false"
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/database/database.sqlite
